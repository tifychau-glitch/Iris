# Messaging Configuration
# Direct API integration for Telegram

telegram:
  enabled: true
  # Bot token from .env: TELEGRAM_BOT_TOKEN
  # Get your user ID: message @userinfobot on Telegram
  allowed_user_ids: []  # Set via dashboard (TELEGRAM_USER_ID in .env) or add IDs here
  allowed_usernames: []  # Or usernames without @ (e.g., ["your_username"])
  polling_interval: 1.0  # seconds between polling checks

security:
  # Rate limiting
  max_messages_per_minute: 30
  max_messages_per_hour: 200

  # Operations requiring confirmation
  require_confirmation:
    - file_deletion
    - git_push
    - git_reset
    - api_calls_with_cost
    - system_commands

  # Blocked patterns (will be rejected)
  blocked_patterns:
    - "rm -rf"
    - "sudo"
    - "DROP TABLE"
    - "DELETE FROM"

  # Sensitive patterns to redact from logs
  redact_patterns:
    - "API_KEY"
    - "TOKEN"
    - "PASSWORD"
    - "SECRET"
    - "CREDENTIAL"

silence_handling:
  enabled: true
  # Follow-up messages when user doesn't respond to IRIS's hook
  follow_ups:
    - delay_seconds: 30
      message: "Take a second."
    - delay_seconds: 90
      message: "Something came to mind."
  # Max follow-ups before IRIS stops. Must match number of entries above.
  max_follow_ups: 2
  # Only trigger silence handling after these outbound patterns
  trigger_patterns:
    - "What's something you've been putting off"
    - "Don't overthink it"

logging:
  enabled: true
  log_file: "logs/messaging.log"
  log_to_db: true
