# AI OS — Runtime Preferences
# Read by Claude at skill execution time (not imported by scripts).
# The iris-setup wizard will update this file during configuration.

# General
timezone: "America/New_York"
date_format: "YYYY-MM-DD"

# Model routing defaults (used by Claude Code harness for skill orchestration)
default_model: "opus"           # For complex reasoning
automation_model: "sonnet"      # For routine automation skills
quick_model: "haiku"            # For simple formatting/classification

# AI Provider — which backend Python scripts use for reasoning calls
# Options: claude-cli (default, subscription), anthropic, openai, google
ai_provider: "claude-cli"

# Model tier mapping — abstract tiers → provider-specific models
# Scripts call ai.reason(..., tier="default") and the tier resolves to
# the correct model string for whichever provider is active.
# Update model strings here as new models release — no code changes needed.
model_tiers:
  anthropic:
    default: "anthropic/claude-sonnet-4-20250514"
    fast: "anthropic/claude-sonnet-4-20250514"
    cheap: "anthropic/claude-haiku-4-20250514"
    powerful: "anthropic/claude-opus-4-20250514"
  openai:
    default: "openai/gpt-4o"
    fast: "openai/gpt-4o-mini"
    cheap: "openai/gpt-4o-mini"
    powerful: "openai/o3"
  google:
    default: "gemini/gemini-2.5-flash"
    fast: "gemini/gemini-2.0-flash"
    cheap: "gemini/gemini-2.0-flash"
    powerful: "gemini/gemini-2.5-pro"

# Content defaults
content_platforms: ["instagram", "facebook", "tiktok"]
post_length: "medium"           # short (~300 chars), medium (~600 chars), long (~1200 chars)

# Communication
confirm_before_sending: true    # Always confirm before external communications
verbose_output: false           # Detailed vs concise output
