<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS - Setup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    max-width: 400px;
    width: 90%;
    padding: 48px 0;
  }
  h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #fff;
  }
  .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .description {
    font-size: 13px;
    color: #555;
    margin-bottom: 32px;
    line-height: 1.5;
  }
  form { display: flex; flex-direction: column; gap: 16px; }
  label {
    font-size: 12px;
    color: #aaa;
    margin-bottom: -8px;
  }
  input[type="password"] {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 16px;
    color: #fff;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="password"]:focus { border-color: #666; }
  input[type="password"]::placeholder { color: #555; }
  button {
    background: #fff;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    color: #f87171;
    font-size: 13px;
    display: none;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Set up IRIS.</h1>
    <p class="subtitle">Create a password for your dashboard.</p>
    <p class="description">This protects your settings, API keys, and project data. You'll use this password to log in.</p>
    <form id="setupForm">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" required autofocus>
      <label>Confirm</label>
      <input type="password" id="confirm" placeholder="Confirm password" required>
      <p class="error" id="errorMsg"></p>
      <button type="submit">Set Password</button>
    </form>
  </div>
  <script>
    document.getElementById('setupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const errorEl = document.getElementById('errorMsg');
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      btn.disabled = true;
      errorEl.style.display = 'none';

      if (password !== confirm) {
        errorEl.textContent = "Passwords don't match.";
        errorEl.style.display = 'block';
        btn.disabled = false;
        return;
      }

      if (password.length < 6) {
        errorEl.textContent = 'At least 6 characters.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        return;
      }

      try {
        const res = await fetch('/api/auth/setup', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({password})
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/settings';
        } else {
          errorEl.textContent = data.error || 'Something went wrong.';
          errorEl.style.display = 'block';
          btn.disabled = false;
        }
      } catch {
        errorEl.textContent = 'Connection error.';
        errorEl.style.display = 'block';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
