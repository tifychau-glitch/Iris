# Connector Registry — defines all integrations IRIS can use
# Each connector lists the fields needed and how to validate them

connectors:
  - name: claude_cli
    display_name: Claude Code
    category: ai
    required: true
    description: "Already connected — you logged in when IRIS started"
    fields: []
    status_only: true

  - name: telegram
    display_name: Telegram
    category: communication
    required: true
    description: "How IRIS reaches you outside this window"
    fields:
      - key: TELEGRAM_BOT_TOKEN
        label: Bot Token
        hint: "From @BotFather on Telegram"
        sensitive: true
      - key: TELEGRAM_USER_ID
        label: Your User ID
        hint: "Message @userinfobot to get it"
        sensitive: false
    test_script: test_telegram.py

  - name: gmail
    display_name: Gmail
    category: communication
    required: false
    description: "Send emails through your Gmail"
    fields:
      - key: SMTP_USER
        label: Gmail Address
        hint: "Your Gmail address"
        sensitive: false
      - key: SMTP_PASSWORD
        label: App Password
        hint: "From myaccount.google.com/apppasswords"
        sensitive: true
    test_script: test_gmail.py

  - name: obsidian_vault
    display_name: Obsidian Vault
    category: memory
    required: false
    description: "Your second brain — IRIS creates it for you"
    fields:
      - key: IRIS_VAULT_PATH
        label: Vault Folder
        hint: "Leave blank for default"
        sensitive: false
    test_script: test_obsidian_vault.py

  - name: pinecone
    display_name: Pinecone
    category: memory
    required: false
    description: "Long-term memory across sessions (optional)"
    fields:
      - key: PINECONE_API_KEY
        label: API Key
        hint: "From app.pinecone.io"
        sensitive: true
      - key: PINECONE_INDEX_NAME
        label: Index Name
        hint: "Your Pinecone index name"
        sensitive: false
    test_script: test_pinecone.py

  - name: openai
    display_name: OpenAI
    category: ai
    required: false
    description: "Powers memory embeddings (~$0.50/mo)"
    fields:
      - key: OPENAI_API_KEY
        label: API Key
        hint: "From platform.openai.com"
        sensitive: true
    test_script: test_openai.py

  - name: slack
    display_name: Slack
    category: communication
    required: false
    description: "Send messages to Slack channels"
    fields:
      - key: SLACK_BOT_TOKEN
        label: Bot Token
        hint: "From api.slack.com/apps"
        sensitive: true
      - key: SLACK_CHANNEL_ID
        label: Channel ID
        hint: "Right-click channel > copy ID"
        sensitive: false
    test_script: test_slack.py

  - name: anthropic
    display_name: Anthropic
    category: ai
    required: false
    description: "Direct API access (if not using Claude Code)"
    fields:
      - key: ANTHROPIC_API_KEY
        label: API Key
        hint: "From console.anthropic.com"
        sensitive: true
    test_script: test_anthropic.py

  - name: auphonic
    display_name: Auphonic
    category: media
    required: false
    description: "Video processing and YouTube upload"
    fields:
      - key: AUPHONIC_API_KEY
        label: API Key
        hint: "From auphonic.com"
        sensitive: true
    test_script: test_auphonic.py
