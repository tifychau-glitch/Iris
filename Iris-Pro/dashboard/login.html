<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS - Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    max-width: 360px;
    width: 90%;
    padding: 48px 0;
  }
  h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #fff;
  }
  .subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 32px;
  }
  form { display: flex; flex-direction: column; gap: 16px; }
  input[type="password"] {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 16px;
    color: #fff;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="password"]:focus { border-color: #666; }
  input[type="password"]::placeholder { color: #555; }
  button {
    background: #fff;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    color: #f87171;
    font-size: 13px;
    display: none;
    margin-top: -8px;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>IRIS</h1>
    <p class="subtitle">Enter your password to continue.</p>
    <form id="loginForm">
      <input type="password" name="password" id="password" placeholder="Password" required autofocus>
      <p class="error" id="errorMsg"></p>
      <button type="submit">Log in</button>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const errorEl = document.getElementById('errorMsg');
      btn.disabled = true;
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({password: document.getElementById('password').value})
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/';
        } else {
          errorEl.textContent = data.error || 'Wrong password.';
          errorEl.style.display = 'block';
          btn.disabled = false;
        }
      } catch {
        errorEl.textContent = 'Connection error.';
        errorEl.style.display = 'block';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
