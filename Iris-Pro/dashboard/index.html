<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
  }

  header {
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #222;
  }

  header h1 { font-size: 20px; font-weight: 600; color: #fff; }

  .pulse {
    width: 8px; height: 8px;
    background: #4ade80;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-bar {
    font-size: 12px;
    color: #888;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .add-btn {
    background: #fff;
    color: #000;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .add-btn:hover { opacity: 0.85; }

  .board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    padding: 24px 32px;
    min-height: calc(100vh - 80px);
  }

  .column {
    background: #181818;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    min-height: 200px;
  }

  .column-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid #282828;
  }

  .column-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .column-count {
    background: #282828;
    color: #aaa;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .col-idea .column-title { color: #a78bfa; }
  .col-not_started .column-title { color: #94a3b8; }
  .col-in_progress .column-title { color: #38bdf8; }
  .col-blocked .column-title { color: #fb923c; }
  .col-done .column-title { color: #4ade80; }

  .cards { flex: 1; display: flex; flex-direction: column; gap: 8px; }

  .card {
    background: #222;
    border-radius: 8px;
    padding: 12px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    border: 1px solid transparent;
  }

  .card:hover {
    background: #2a2a2a;
    border-color: #333;
    transform: translateY(-1px);
  }

  .card-name { font-size: 14px; font-weight: 500; color: #fff; margin-bottom: 4px; }
  .card-desc { font-size: 12px; color: #888; line-height: 1.4; }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }

  .card-time { font-size: 10px; color: #555; }

  .card-progress {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .progress-bar {
    width: 48px;
    height: 4px;
    background: #333;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: #4ade80;
    border-radius: 2px;
    transition: width 0.3s;
  }

  .progress-text {
    font-size: 10px;
    color: #666;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 24px;
    width: 500px;
    max-width: 90vw;
    max-height: 85vh;
    overflow-y: auto;
  }

  .modal h2 { font-size: 16px; margin-bottom: 16px; color: #fff; }

  .modal label {
    display: block;
    font-size: 12px;
    color: #aaa;
    margin-bottom: 4px;
    margin-top: 12px;
  }

  .modal input, .modal textarea, .modal select {
    width: 100%;
    padding: 10px 12px;
    background: #222;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }

  .modal input:focus, .modal textarea:focus, .modal select:focus {
    border-color: #555;
  }

  .modal textarea { resize: vertical; min-height: 60px; }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s;
  }

  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #fff; color: #000; }
  .btn-ghost { background: transparent; color: #aaa; border: 1px solid #333; }
  .btn-danger { background: #dc2626; color: #fff; }

  /* Tasks section in modal */
  .tasks-section {
    margin-top: 16px;
    border-top: 1px solid #282828;
    padding-top: 12px;
  }

  .tasks-section h3 {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .task-add-row {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }

  .task-add-row input {
    flex: 1;
    padding: 8px 10px;
    font-size: 13px;
  }

  .task-add-btn {
    background: #333;
    color: #fff;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }

  .task-add-btn:hover { background: #444; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid #222;
  }

  .task-item:last-child { border-bottom: none; }

  .task-check {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 2px solid #444;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .task-check:hover { border-color: #4ade80; }

  .task-check.checked {
    background: #4ade80;
    border-color: #4ade80;
  }

  .task-check.checked::after {
    content: '';
    width: 5px;
    height: 9px;
    border: solid #000;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
    margin-bottom: 2px;
  }

  .task-title {
    flex: 1;
    font-size: 13px;
    color: #ccc;
  }

  .task-title.done {
    text-decoration: line-through;
    color: #555;
  }

  .task-delete {
    background: none;
    border: none;
    color: #444;
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .task-item:hover .task-delete { opacity: 1; }
  .task-delete:hover { color: #dc2626; }

  .activity-log {
    margin-top: 16px;
    border-top: 1px solid #282828;
    padding-top: 12px;
  }

  .activity-log h3 {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 8px;
  }

  .activity-item {
    font-size: 12px;
    color: #666;
    padding: 4px 0;
    border-bottom: 1px solid #1a1a1a;
  }

  .activity-item span { color: #888; }

  .empty-col {
    color: #444;
    font-size: 12px;
    text-align: center;
    padding: 24px 8px;
  }

  /* Accountability Panel */
  .acc-panel {
    padding: 16px 32px;
    border-bottom: 1px solid #222;
  }

  .acc-stats {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .acc-stat {
    background: #181818;
    border-radius: 10px;
    padding: 14px 20px;
    min-width: 120px;
    flex: 1;
  }

  .acc-stat-value {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
  }

  .acc-stat-slash {
    font-size: 18px;
    color: #555;
    margin: 0 2px;
  }

  .acc-stat-label {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  .acc-trust .acc-stat-value { color: #4ade80; }

  .acc-bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 48px;
    margin-top: 14px;
    padding: 0 4px;
  }

  .acc-bar-day {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .acc-bar {
    width: 100%;
    border-radius: 3px 3px 0 0;
    min-height: 2px;
    transition: height 0.3s;
  }

  .acc-bar-label {
    font-size: 9px;
    color: #555;
  }

  @media (max-width: 900px) {
    .board { grid-template-columns: 1fr; }
    .acc-stats { gap: 8px; }
    .acc-stat { min-width: 90px; padding: 10px 14px; }
    .acc-stat-value { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:24px;">
    <h1>IRIS</h1>
    <div style="display:flex;gap:4px;background:#181818;border-radius:10px;padding:3px;">
      <a href="/" style="padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;background:#333;color:#fff;text-decoration:none;">Projects</a>
      <a href="/settings" style="padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#888;text-decoration:none;">Settings</a>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="status-bar">
      <span class="pulse"></span>
      <span id="lastUpdated">Loading...</span>
    </div>
    <button class="add-btn" onclick="openNewModal()">+ New Project</button>
    <button class="add-btn" style="background:#222;color:#aaa;font-weight:500;" onclick="logout()">Log out</button>
  </div>
</header>

<!-- Accountability Panel -->
<div class="acc-panel" id="accPanel" style="display:none">
  <div class="acc-stats">
    <div class="acc-stat acc-trust">
      <div class="acc-stat-value" id="accTrust">--</div>
      <div class="acc-stat-label">Self-Trust</div>
    </div>
    <div class="acc-stat">
      <div class="acc-stat-value" id="accStreak">--</div>
      <div class="acc-stat-label">Streak</div>
    </div>
    <div class="acc-stat">
      <div class="acc-stat-value" id="accLevel">--</div>
      <div class="acc-stat-label" id="accLevelName">Level</div>
    </div>
    <div class="acc-stat">
      <div class="acc-stat-value"><span id="accKept">--</span><span class="acc-stat-slash">/</span><span id="accMade">--</span></div>
      <div class="acc-stat-label">Kept / Made</div>
    </div>
    <div class="acc-stat">
      <div class="acc-stat-value" id="accExcuse">--</div>
      <div class="acc-stat-label">Top Excuse</div>
    </div>
    <div class="acc-stat">
      <div class="acc-stat-value" id="accGhost">--</div>
      <div class="acc-stat-label">Ghost Days</div>
    </div>
  </div>
  <div class="acc-bar-chart" id="accChart"></div>
</div>

<div class="board" id="board"></div>

<!-- New / Edit Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modalTitle">New Project</h2>
    <input type="hidden" id="editId">

    <label>Name</label>
    <input type="text" id="inputName" placeholder="Project name">

    <label>Description</label>
    <textarea id="inputDesc" placeholder="Brief description (optional)"></textarea>

    <label>Status</label>
    <select id="inputStatus">
      <option value="idea">Idea</option>
      <option value="not_started">Not Started</option>
      <option value="in_progress">In Progress</option>
      <option value="blocked">Blocked</option>
      <option value="done">Done</option>
    </select>

    <!-- Tasks (only shown when editing) -->
    <div class="tasks-section" id="tasksSection" style="display:none">
      <h3>
        <span>Subtasks</span>
        <span id="taskProgress" style="color:#666"></span>
      </h3>
      <div class="task-add-row">
        <input type="text" id="newTaskInput" placeholder="Add a subtask..." onkeydown="if(event.key==='Enter')addTask()">
        <button class="task-add-btn" onclick="addTask()">Add</button>
      </div>
      <div id="tasksList"></div>
    </div>

    <div class="activity-log" id="activitySection" style="display:none">
      <h3>Activity Log</h3>
      <div id="activityList"></div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-danger" id="archiveBtn" style="display:none;margin-right:auto" onclick="archiveProject()">Archive</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveBtn" onclick="save()">Create</button>
    </div>
  </div>
</div>

<script>
const COLUMNS = [
  { key: 'idea', label: 'Ideas' },
  { key: 'not_started', label: 'Not Started' },
  { key: 'in_progress', label: 'In Progress' },
  { key: 'blocked', label: 'Blocked' },
  { key: 'done', label: 'Done' },
];

let projects = [];
let currentTasks = [];
let pollTimer = null;

async function fetchProjects() {
  try {
    const res = await fetch('/api/projects');
    projects = await res.json();
    render();
    document.getElementById('lastUpdated').textContent = 'Live - ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('lastUpdated').textContent = 'Offline';
  }
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  COLUMNS.forEach(col => {
    const items = projects.filter(p => p.status === col.key);
    const div = document.createElement('div');
    div.className = `column col-${col.key}`;
    div.innerHTML = `
      <div class="column-header">
        <span class="column-title">${col.label}</span>
        <span class="column-count">${items.length}</span>
      </div>
      <div class="cards">
        ${items.length === 0 ? `<div class="empty-col">No projects</div>` :
          items.map(p => {
            const hasT = p.task_total > 0;
            const pct = hasT ? Math.round((p.task_done / p.task_total) * 100) : 0;
            return `
            <div class="card" onclick="openEditModal(${p.id})">
              <div class="card-name">${esc(p.name)}</div>
              ${p.description ? `<div class="card-desc">${esc(p.description)}</div>` : ''}
              <div class="card-footer">
                <span class="card-time">${timeAgo(p.updated_at)}</span>
                ${hasT ? `
                  <div class="card-progress">
                    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                    <span class="progress-text">${p.task_done}/${p.task_total}</span>
                  </div>
                ` : ''}
              </div>
            </div>`;
          }).join('')
        }
      </div>
    `;
    board.appendChild(div);
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

// --- Modal ---

function openNewModal() {
  document.getElementById('modalTitle').textContent = 'New Project';
  document.getElementById('editId').value = '';
  document.getElementById('inputName').value = '';
  document.getElementById('inputDesc').value = '';
  document.getElementById('inputStatus').value = 'idea';
  document.getElementById('saveBtn').textContent = 'Create';
  document.getElementById('archiveBtn').style.display = 'none';
  document.getElementById('tasksSection').style.display = 'none';
  document.getElementById('activitySection').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(() => document.getElementById('inputName').focus(), 50);
}

async function openEditModal(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = 'Edit Project';
  document.getElementById('editId').value = id;
  document.getElementById('inputName').value = p.name;
  document.getElementById('inputDesc').value = p.description || '';
  document.getElementById('inputStatus').value = p.status;
  document.getElementById('saveBtn').textContent = 'Save';
  document.getElementById('archiveBtn').style.display = 'block';
  document.getElementById('tasksSection').style.display = 'block';
  document.getElementById('modalOverlay').classList.add('active');

  // Load tasks
  await loadTasks(id);

  // Load activity
  try {
    const res = await fetch(`/api/projects/${id}/activity`);
    const activity = await res.json();
    const section = document.getElementById('activitySection');
    const list = document.getElementById('activityList');
    if (activity.length > 0) {
      section.style.display = 'block';
      list.innerHTML = activity.map(a =>
        `<div class="activity-item"><span>${new Date(a.created_at).toLocaleString()}</span> - ${esc(a.message)}</div>`
      ).join('');
    } else {
      section.style.display = 'none';
    }
  } catch (e) {}
}

async function loadTasks(projectId) {
  try {
    const res = await fetch(`/api/projects/${projectId}/tasks`);
    currentTasks = await res.json();
  } catch (e) {
    currentTasks = [];
  }
  renderTasks();
}

function renderTasks() {
  const list = document.getElementById('tasksList');
  const done = currentTasks.filter(t => t.done).length;
  const total = currentTasks.length;
  document.getElementById('taskProgress').textContent = total > 0 ? `${done}/${total} done` : '';

  if (currentTasks.length === 0) {
    list.innerHTML = '<div style="color:#444;font-size:12px;padding:8px 0;">No subtasks yet</div>';
    return;
  }

  list.innerHTML = currentTasks.map(t => `
    <div class="task-item">
      <div class="task-check ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})"></div>
      <span class="task-title ${t.done ? 'done' : ''}">${esc(t.title)}</span>
      <button class="task-delete" onclick="deleteTask(${t.id})">&times;</button>
    </div>
  `).join('');
}

async function addTask() {
  const input = document.getElementById('newTaskInput');
  const title = input.value.trim();
  if (!title) return;
  const projectId = document.getElementById('editId').value;

  await fetch(`/api/projects/${projectId}/tasks`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title }),
  });

  input.value = '';
  await loadTasks(projectId);
  fetchProjects();
}

async function toggleTask(taskId) {
  await fetch(`/api/tasks/${taskId}/toggle`, { method: 'POST' });
  const projectId = document.getElementById('editId').value;
  await loadTasks(projectId);
  fetchProjects();
}

async function deleteTask(taskId) {
  await fetch(`/api/tasks/${taskId}`, { method: 'DELETE' });
  const projectId = document.getElementById('editId').value;
  await loadTasks(projectId);
  fetchProjects();
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('active');
}

async function save() {
  const id = document.getElementById('editId').value;
  const name = document.getElementById('inputName').value.trim();
  const description = document.getElementById('inputDesc').value.trim();
  const status = document.getElementById('inputStatus').value;

  if (!name) { document.getElementById('inputName').focus(); return; }

  if (id) {
    await fetch(`/api/projects/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, description, status }),
    });
  } else {
    await fetch('/api/projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, description, status }),
    });
  }

  closeModal();
  fetchProjects();
}

async function archiveProject() {
  const id = document.getElementById('editId').value;
  if (!id) return;
  if (!confirm('Archive this project?')) return;
  await fetch(`/api/projects/${id}`, { method: 'DELETE' });
  closeModal();
  fetchProjects();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('active')) {
    if (document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.id !== 'newTaskInput') save();
  }
});

// --- Accountability Panel ---

async function fetchAccountability() {
  try {
    const res = await fetch('/api/accountability');
    const data = await res.json();
    if (!data.available) {
      document.getElementById('accPanel').style.display = 'none';
      return;
    }
    document.getElementById('accPanel').style.display = 'block';

    const trustPct = Math.round(data.self_trust_score * 100);
    const trustEl = document.getElementById('accTrust');
    trustEl.textContent = trustPct + '%';
    trustEl.style.color = trustPct >= 70 ? '#4ade80' : trustPct >= 40 ? '#fbbf24' : '#f87171';

    document.getElementById('accStreak').textContent = data.streak + 'd';
    document.getElementById('accLevel').textContent = data.accountability_level;
    document.getElementById('accLevelName').textContent = data.level_name;
    document.getElementById('accKept').textContent = data.promises_kept_week;
    document.getElementById('accMade').textContent = data.promises_made_week;
    document.getElementById('accExcuse').textContent = data.top_excuse || 'none';
    document.getElementById('accGhost').textContent = data.ghost_days;

    // Render mini bar chart
    renderAccChart(data.daily_data);
  } catch (e) {
    document.getElementById('accPanel').style.display = 'none';
  }
}

function renderAccChart(dailyData) {
  const chart = document.getElementById('accChart');
  if (!dailyData || dailyData.length === 0) {
    chart.innerHTML = '<span style="color:#444;font-size:11px;">No daily data yet</span>';
    return;
  }

  const maxMade = Math.max(...dailyData.map(d => d.commitments_made), 1);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  chart.innerHTML = dailyData.map(d => {
    const dt = new Date(d.date + 'T12:00:00');
    const dayName = days[dt.getDay()];
    const rate = d.completion_rate;
    const height = Math.max(4, Math.round((d.commitments_made / maxMade) * 40));
    const color = rate >= 0.8 ? '#4ade80' : rate >= 0.5 ? '#fbbf24' : rate > 0 ? '#f87171' : '#333';
    return `<div class="acc-bar-day">
      <div class="acc-bar" style="height:${height}px;background:${color}"></div>
      <div class="acc-bar-label">${dayName}</div>
    </div>`;
  }).join('');
}

// Poll every 3 seconds for live updates
async function logout() {
  await fetch('/api/auth/logout', {method:'POST'});
  window.location.href = '/login';
}

fetchProjects();
fetchAccountability();
pollTimer = setInterval(() => { fetchProjects(); fetchAccountability(); }, 3000);
</script>
